services:
  api:
    build: .
    container_name: yuedu-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    volumes:
      - uploads:/app/uploads
    networks:
      - yuedu-network

  mongo:
    image: mongo:7.0
    container_name: yuedu-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - yuedu-network

  redis:
    image: redis:7-alpine
    container_name: yuedu-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - yuedu-network

volumes:
  mongo-data:
  redis-data:
  uploads:

networks:
  yuedu-network:
    driver: bridge
