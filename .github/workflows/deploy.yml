name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          pnpm install --no-optional
          pnpm exec tsc --version
          echo "✅ Dependencies OK"

      - name: Build TypeScript
        run: pnpm exec tsc

      - name: Verify build output
        run: |
          test -f dist/server.js || { echo "❌ Build output missing"; exit 1; }
          echo "✅ Build OK: $(find dist -name '*.js' | wc -l) JS files"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_TOKEN
          script: |
            set -e
            mkdir -p /opt/yuedu
            cd /opt/yuedu

            echo '${{ secrets.DEPLOY_ENV }}' > .env

            cat > docker-compose.yml << 'DCEOF'
            services:
              api:
                image: ghcr.io/zhou-jor/yuedu-api:latest
                container_name: yuedu-api
                restart: unless-stopped
                ports:
                  - "3000:3000"
                env_file:
                  - .env
                depends_on:
                  - mongo
                  - redis
                volumes:
                  - uploads:/app/uploads
                networks:
                  - yuedu-network

              mongo:
                image: mongo:7.0
                container_name: yuedu-mongo
                restart: unless-stopped
                volumes:
                  - mongo-data:/data/db
                networks:
                  - yuedu-network

              redis:
                image: redis:7-alpine
                container_name: yuedu-redis
                restart: unless-stopped
                volumes:
                  - redis-data:/data
                networks:
                  - yuedu-network

            volumes:
              mongo-data:
              redis-data:
              uploads:

            networks:
              yuedu-network:
                driver: bridge
            DCEOF

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u zhou-jor --password-stdin || true
            docker compose pull api || true
            docker compose pull mongo || true
            docker compose pull redis || true
            docker compose up -d
            docker compose ps
            echo "✅ Deploy done"
